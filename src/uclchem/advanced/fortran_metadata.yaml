# Fortran Parameter Classification
# This file defines which Fortran variables are compile-time constants (PARAMETER)
# and which are internal solver/computation variables (INTERNAL).
#
# Variables not listed here are considered user-facing modifiable parameters.

fortran_parameters:
  # Attributes present as Fortran KIND parameters across virtually every module.
  # Listed here so they are added to the global skip set regardless of module.
  global:
    - dp

  # network.f90 - species/reaction data arrays (compile-time constants)
  network:
    - mintemps
    - maxtemps
    - exothermicities
    - reducedmasses
    - mass
    - atomcounts
    - surfacelist
    - bulklist
    - icelist
    - gasicelist
    - solidfractions
    - monofractions
    - volcanicfractions
    - formationenthalpy
    - refractorylist
    - re1
    - re2
    - re3
    - p1
    - p2
    - p3
    - p4
    - extrapolaterates
    # network.f90 - reaction range arrays
    - photonreacs
    - crpreacs
    - crphotreacs
    - freezereacs
    - desorbreacs
    - thermreacs
    - desoh2reacs
    - descrreacs
    - deuvcrreacs
    - h2formreacs
    - erreacs
    - erdesreacs
    - lhreacs
    - lhdesreacs
    - bulkswapreacs
    - surfswapreacs
    - ionopol1reacs
    - ionopol2reacs
    - crsreacs
    - exsolidreacs
    - exrelaxreacs
    - twobodyreacs
    - garreacs
    - freezepartners
    # network.f90 - build-time flags (read-only in spawned workers)
    - enablechemicalheating
    - three_phase
    # network.f90 - species indices (compile-time lookups)
    - n13c
    - n15n
    - n18o
    - nbulk
    - nc
    - nch3oh
    - ncl
    - nclx
    - nco
    - ncx
    - nd
    - nelec
    - nf
    - nfe
    - ngh
    - ngh2
    - ngn
    - ngo
    - ngoh
    - nh
    - nh2
    - nh2o
    - nhe
    - nhex
    - nhx
    - nli
    - nmg
    - nmgx
    - nn
    - nna
    - nnx
    - "no"
    - nox
    - np
    - npah
    - nsurface
    - ns
    - nsi
    - nsix
    - nsx
    # network.f90 - reaction indices
    - nr_c_hv
    - nr_co_hv
    - nr_efreeze
    - nr_h2_crp
    - nr_h2_hv
    - nr_h2_ed
    - nr_h_ed
    - nr_h2form_ct
    - nr_h2form_er
    - nr_h2form_erdes
    - nr_h2form_lh
    - nr_h2form_lhdes
    - nr_h2freeze
    - nr_hfreeze

  # heating.f90 - compile-time array dimension PARAMETERs
  heating:
    - max_line_solve_attempts
    - ncooling
    - nheating
    - nheatingterms

  # cshock.f90 - grain/shock PARAMETERs
  cshock_mod:
    - bt
    - grainradius
    - nu0

  # hotcore.f90 - mass grid size PARAMETER
  hotcore:
    - nmasses

  # chemistry.f90 - solver limit PARAMETERs
  chemistry:
    - maxconsecutivefailures
    - maxloops

  # rates.f90 - H sticking curve PARAMETERs
  rates:
    - h2stickingtemp
    - h2stickingzero
    - hstickingtemp
    - hstickingzero

  # photoreactions.f90 - table dimension PARAMETERs
  photoreactions:
    - dimco
    - dimh2

  # sputtering.f90 - vaporization speed PARAMETER
  sputtering:
    - vaporize_speed

  # io.f90 - file unit ID PARAMETERs
  io:
    - abundloadid
    - abundsaveid
    - columnid
    - debugid
    - heatingid
    - inputid
    - outid
    - outputid
    - rateconstantid
    - ratesid

internal_parameters:
  # physicscore - ODE solver internals
  physicscore:
    - currenttimeold
    - dstep
    - ckhdiss
    - ckhion
    - ckldiss
    - cklion
  
  # network - reaction computation internals
  network:
    - reactionrate
    - storeratescomputation
  
  # heating - internal computation arrays
  heating:
    - chemheating
    - coolingvalues
    - heatingvalues
    - linecoolingarray_size
    - linecoolinglabels
    - median_line_index
    - permutationarray_size
    - line_solver_attempts
  surfacereactions:
    - num_monolayers_is_surface
    - gas_dust_density_ratio
    - num_sites_per_grain
  
  # io - file unit numbers
  io:
    - columnfunit
    - filenum
    - heatfunit
    - logfunit
    - outputfunit
    - rateconstantfunit
    - ratesfunit
    - readabundfunit
    - rout_funit
    - saveabundfunit
  
  # cshock/jshock - internal iteration variables
  cshock_mod:
    - postshock
    - inrad
    - tempindx
  jshock_mod:
    - postshock
    - inrad
    - tempindx

  constants:
    - parameter_read_error
    - physics_init_error
    - chem_init_error
    - int_unrecoverable_error
    - int_too_many_fails_error
    - not_enough_timepoints_error
    - physics_update_error
    - solver_stats_overflow_error
    - coolant_file_error
    - coolant_data_error
    - coolant_freq_tol_error
    - coolant_pop_tol_error
    - coolant_solver_error
    - coolant_config_error          
    - negative_abundance_error

file_path_parameters:
  # File paths that should only be set via param_dict, not GeneralSettings
  # These are handled specially by logic inside wrap.f90 (opening and closing of files)
  defaultparameters:
    - outputfile
    - columnfile
    - rateconstantfile
    - ratesfile
    - heatingfile
    - abundsavefile
    - abundloadfile

# Note: coolantdatadir was moved from defaultparameters to f2py_constants
# and is now set via HeatingSettings.set_coolant_directory()
