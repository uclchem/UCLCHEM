name: Test heating and cooling features

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_run:
    workflows: ["Lint"]
    types:
      - completed

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'pull_request' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.12"

    - name: Install gfortran
      run: |
        sudo apt-get -y update
        sudo apt-get -y install gfortran

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-timeout pytest-xdist pytest-github-actions-annotate-failures

    - name: Install package
      run: |
        pip install .

    - name: Run heating and cooling install tests
      run: |
        pytest tests/test_heating_cooling_install.py -v
